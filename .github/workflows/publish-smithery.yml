name: Publish to Smithery

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Smithery CLI
        run: npm install -g smithery@latest

      - name: Build MCPB bundle
        run: |
          zip -r DevOpsOnPrem.zip CHANGELOG.md LICENSE manifest.json pyproject.toml README.md requirements.txt smithery.yaml src/
          mv DevOpsOnPrem.zip DevOpsOnPrem.mcpb

      - name: Publish to Smithery
        run: smithery mcp publish ./DevOpsOnPrem.mcpb -n zwitbaum/mcp-devops-onpremise
        env:
          SMITHERY_API_KEY: ${{ secrets.SMITHERY_API_KEY }}
